<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alter Ego - Joao</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="sc_Joao_body" class="sc_Joao_modo_civil">

    <header>
        <h1 id="sc_Joao_titulo">Identidade Civil</h1>
        <!-- Botão único de transformação conforme exigido no desafio -->
        <button id="sc_Joao_btn_transformar" onclick="sc_Joao_transformar()">Transformar!</button>
    </header>

    <main id="sc_Joao_container" class="sc_Joao_grid_container">
        <!-- Card Principal -->
        <section class="sc_Joao_card">
            <img id="sc_Joao_foto" src="fotos/avatar.webp" alt="Foto de Joao">
            <h2 id="sc_Joao_nome">Joao Victor</h2>
            <p id="sc_Joao_idade">22 Anos</p>
        </section>

        <!-- Card de Descrição -->
        <section class="sc_Joao_card">
            <h3>Sobre Mim</h3>
            <p id="sc_Joao_bio">Estudante de Desenvolvimento Web focado em aprender novas tecnologias.</p>
        </section>

        <!-- Card de Preferências -->
        <section class="sc_Joao_card">
            <h3>Preferências</h3>
            <p><strong>Hobby:</strong> <span id="sc_Joao_hobby">Programar e Jogar</span></p>
            <p><strong>Comida:</strong> <span id="sc_Joao_comida">Pizza</span></p>
        </section>

        <!-- Cards Extras -->
        <section class="sc_Joao_card">
            <h3>Time/Hobby Extra</h3>
            <p id="sc_Joao_extra1">Andar de Moto .</p>
        </section>

        <section class="sc_Joao_card">
            <h3>Curiosidade</h3>
            <p id="sc_Joao_extra2">Adoro resolver desafios de lógica.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
